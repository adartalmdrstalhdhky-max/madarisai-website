<script>
    function saveStudent() {
        const name = document.getElementById('studentName').value;
        const level = document.getElementById('studentLevel').value;
        
        if(name && level) {
            // حفظ البيانات في ذاكرة المتصفح (عمل حقيقي)
            const studentData = { name: name, level: level, date: new Date().toLocaleDateString() };
            localStorage.setItem('currentStudent', JSON.stringify(studentData));
            
            alert('تم تسجيلك بنجاح يا ' + name + '! سيتم توجيهك للوحة التحكم.');
            window.location.href = 'dashboard.html';
        } else {
            alert('يرجى ملء كافة الحقول');
        }
    }
</script>

<button type="button" onclick="saveStudent()" class="cta-button">إنشاء حساب جديد</button>
