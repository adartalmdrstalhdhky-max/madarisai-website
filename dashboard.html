<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | Madaris AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #050a18; padding: 20px;">
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #112240; border-radius: 15px;">
        <div style="color: #00d2ff; font-weight: bold;">لوحة الطالب: عصام</div>
        <div style="color: #00ff00; font-size: 0.8rem;">● متصل (المزامنة مفعلة)</div>
    </nav>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px;">
        <div style="background: #1e293b; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid #00d2ff;">
            <h3>دروس اليوم</h3>
            <p>الذكاء الاصطناعي 101</p>
            <button class="cta-button" style="padding: 5px 15px; font-size: 0.8rem;">ابدأ الدرس</button>
        </div>
        <div style="background: #1e293b; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid #d4af37;">
            <h3>المهام المطلوبة</h3>
            <p>حل اختبار الوحدة الأولى</p>
        </div>
    </div>
</body>
</html>
